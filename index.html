    Hello world! <br>
    This is the current date and time, as computed by Python:
    <script type="py">
        from pyscript import display
        from datetime import datetime
        now = datetime.now()
        display(now.strftime("%m/%d/%Y, %H:%M:%S"))
        display('HELLO PYQUEST!!!')
    </script>

        on pyscript.com</a>&nbsp;│&nbsp;<a href="https://pyscript.com/@examples/hello-world/latest" id="view-code"
                                           target="_blank" style="color:#FFF;text-decoration:none;">View Code</a><span
        id="install-pwa-section">&nbsp;│&nbsp; <a id="install-pwa"
                                                  style="cursor:pointer; color:#FFF;">Install</a></span>&nbsp;&nbsp;
</div>

<script>
    let installPrompt = null;
    const installSection = document.querySelector("#install-pwa-section")
    const installButton = document.querySelector("#install-pwa");

    window.addEventListener("beforeinstallprompt", (event) => {
        if ("onappinstalled" in window) {
            installSection.removeAttribute("hidden")
        }
        event.preventDefault();
        installPrompt = event;
    });

    installButton.addEventListener("click", async () => {
        if (!installPrompt) {
            return;
        }
        const result = await installPrompt.prompt();
        disableInAppInstallPrompt();
    });

    function disableInAppInstallPrompt() {
        installPrompt = null;
        installButton.setAttribute("hidden", "");
    };
</script>
